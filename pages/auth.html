<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniPlace | Acceso</title>
    <link rel="stylesheet" href="../css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-glow"></div>

    <section class="auth-container">
        <div class="auth-card">
            <img src="../assets/icon.png" alt="UniPlace" class="logo">

            <div class="tabs">
                <button class="tab active" id="loginTab">Iniciar Sesión</button>
                <button class="tab" id="registerTab">Registrarse</button>
            </div>

            <form id="loginForm">
                <input type="email" placeholder="Correo institucional o personal" required>
                <input type="password" placeholder="Contraseña" required>
                <button type="submit">Ingresar</button>
            </form>

            <form id="registerForm">
                <input type="text" placeholder="Nombre completo" required>
                <input type="email" placeholder="Correo electrónico" required>
                <input type="password" placeholder="Contraseña" required>
                <input type="password" placeholder="Confirmar contraseña" required>
                <button type="submit">Crear cuenta</button>
            </form>

        </div>
    </section>

    <script src="../js/auth.js"></script>
</body>
</html>
