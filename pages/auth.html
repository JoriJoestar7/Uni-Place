<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | UniPlace</title>

    <link rel="icon" href="../assets/icon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;600;700&display=swap">
</head>
<body class="auth-body">

    <div class="cursor-glow"></div>
    <div class="page-noise"></div>
    <div class="background-halo halo-one"></div>
    <div class="background-halo halo-two"></div>

    <main class="auth-wrapper">
        <section class="auth-card fade-up">
            <a href="../index.html" class="auth-brand">
                <img src="../assets/icon.png" alt="Logo UniPlace">
                <span>UniPlace</span>
            </a>

            <div class="auth-heading">
                <p>Acceso académico</p>
                <h1>Entra a tu espacio</h1>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Iniciar sesión</button>
                <button class="tab-btn" data-tab="register">Registrarse</button>
            </div>

            <form class="auth-form" id="loginForm">
                <label>
                    Correo 
                    <input type="email" id="loginEmail" placeholder="Ingresa tu correo">
                </label>

                <label>
                    Contraseña
                    <input type="password" id="loginPassword" placeholder="Ingresa tu contraseña">
                </label>

                <label class="remember-row">
                    <input type="checkbox" id="rememberMe">
                    <span>Recuérdame en este dispositivo</span>
                </label>

                <a href="forgot-password.html" class="forgot-password-link">
                    ¿Olvidaste tu contraseña?
                </a>


                <p class="form-message" id="loginMessage"></p>

                <button type="submit" class="auth-submit">
                    Entrar
                </button>
            </form>

            <form class="auth-form hidden" id="registerForm">
                <label>
                    Nombre
                    <input type="text" id="registerName" placeholder="Tu nombre">
                </label>

                <label>
                    Correo 
                    <input type="email" id="registerEmail" placeholder="Ingresa tu correo">
                    <div class="register-email-warning">
                        <strong>Antes de continuar:</strong>
                        revisa bien tu correo. Lo usarás para verificar tu cuenta y no podrá cambiarse después.
                    </div>

                </label>
                <label>
    Tipo de cuenta
    <select id="registerRole">
        <option value="student">Estudiante</option>
        <option value="entrepreneur">Emprendimiento</option>
        <option value="professor">Profesor</option>
    </select>
</label>

                <label>
                    Contraseña
                    <input type="password" id="registerPassword" placeholder="Crea una contraseña">
                </label>

                <label>
                    Confirmar contraseña
                    <input type="password" id="registerConfirmPassword" placeholder="Repite tu contraseña">
                </label>

                <p class="form-message" id="registerMessage"></p>

                <button type="submit" class="auth-submit">
                    Crear cuenta
                </button>
            </form>
        </section>
    </main>

    <script src="../js/auth.js"></script>
</body>
</html>
