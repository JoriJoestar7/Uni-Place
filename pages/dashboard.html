<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>UniPlace Dashboard</title>

    <link rel="stylesheet" href="../css/dashboard.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">

</head>

<body>

    <div class="container">

        <!-- SIDEBAR -->

        <aside class="sidebar" id="sidebar">

            <div class="sidebar-top">

                <div class="brand">

                    <img
                        src="../assets/icon.png"
                        alt="UniPlace">

                    <h2 class="brand-name">
                        UniPlace
                    </h2>

                </div>

                <button id="toggleSidebar">
                    ☰
                </button>

            </div>

            <div class="menu-section">

                <ul>

                    <li id="newChatBtn" class="active">

                        <span class="menu-text">
                            Nuevo Chat
                        </span>

                    </li>

                    <li data-section="uniplace">

                        <span class="menu-text">
                            ¿Qué es UniPlace?
                        </span>

                    </li>

                    <li data-section="funciona">

                        <span class="menu-text">
                            ¿Cómo Funciona?
                        </span>

                    </li>

                    <li data-section="nosotros">

                        <span class="menu-text">
                            Quiénes Somos
                        </span>

                    </li>

                    <li data-section="autores">

                        <span class="menu-text">
                            Autores
                        </span>

                    </li>

                    <li data-section="terminos">

                        <span class="menu-text">
                            Términos
                        </span>

                    </li>

                </ul>

            </div>

            <div class="chat-history">

                <h3 class="history-title">
                    Conversaciones
                </h3>

                <div id="chatList">

                    <div
                        class="chat-item active-chat"
                        id="defaultChat">

                        Nueva conversación

                    </div>

                </div>

            </div>

        </aside>

        <!-- CONTENIDO PRINCIPAL -->

        <main class="main-content">

            <section id="content">

                <div class="chat-home">

                    <div class="hero-center">

                        <img
                            src="../assets/icon.png"
                            class="hero-logo"
                            alt="UniPlace">

                        <h1>UniPlace</h1>

                        <p>
                            ¿Qué necesitas encontrar hoy?
                        </p>

                    </div>

                    <div id="messages"></div>

                </div>

            </section>

            <!-- BARRA DE CHAT -->

            <div
                class="chat-bar"
                id="chatBar">

                <input
                    type="text"
                    id="messageInput"
                    placeholder="Escribe tu consulta...">

                <button id="sendBtn">
                    →
                </button>

            </div>

        </main>

    </div>

    <script src="../js/dashboard.js"></script>

</body>

</html>
