<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | UniPlace</title>

    <link rel="icon" href="../assets/icon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;600;700&display=swap">
</head>
<body class="dashboard-body">

    <div class="cursor-glow"></div>
    <div class="page-noise"></div>

    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
<div class="sidebar-top">
    <a href="../index.html" class="sidebar-brand">
        <img src="../assets/icon.png" alt="UniPlace">
        <span>UniPlace</span>
    </a>

    <button class="sidebar-toggle" id="sidebarToggle">
        <span></span>
        <span></span>
    </button>
</div>

<div class="dashboard-user-card" id="dashboardUserCard">
    <p class="dashboard-user-label">Sesión activa</p>

    <h2 id="dashboardUserName">
        Usuario
    </h2>

    <span id="dashboardUserEmail">
        correo@uniplace.com
    </span>

    <div class="dashboard-user-role" id="dashboardUserRole">
        student
    </div>

    <div class="dashboard-business-mini hidden" id="dashboardBusinessMini">
        <p>Emprendimiento</p>
        <strong id="dashboardBusinessName">Negocio</strong>
        <span id="dashboardBusinessStatus">pending</span>
    </div>
</div>

<button class="new-chat-btn" id="newChatBtn">
    Nuevo Chat
</button>

            <nav class="sidebar-menu">
                <button data-template="about">Qué es UniPlace</button>
                <button data-template="how">Cómo Funciona</button>
                <button data-template="team">Quiénes Somos</button>
                <button data-template="authors">Autores</button>
                <button data-template="terms">Términos</button>
            </nav>

            <div class="conversation-area">
                <p class="conversation-label">Conversaciones</p>
                <div class="conversation-list" id="conversationList"></div>
            </div>
        </aside>

        <main class="chat-shell">
            <header class="chat-header">
                <div>
                    <p>Workspace académico</p>
                    <h1 id="currentChatTitle">Nuevo Chat</h1>
                </div>

<div class="chat-actions">
    <button class="clear-btn" id="clearStorageBtn">
        Limpiar
    </button>

    <button class="clear-btn" id="logoutBtn">
        Salir
    </button>
</div>
            </header>

            <section class="chat-window" id="chatWindow">
                <div class="empty-state" id="emptyState">
                    <span>UniPlace</span>
                    <h2>¿Qué necesitas resolver hoy?</h2>
                    <p>
                        Pregunta, organiza una idea, estructura una tarea o prepara un tema universitario.
                    </p>
                </div>
            </section>

            <form class="chat-composer" id="chatForm">
                <textarea id="chatInput" rows="1" placeholder="Escribe tu mensaje..."></textarea>
                <button type="submit">Enviar</button>
            </form>
        </main>
    </div>

    <script src="../js/dashboard.js"></script>
</body>
</html>
