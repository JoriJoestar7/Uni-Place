<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña | UniPlace</title>

    <link rel="icon" href="../assets/icon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;600;700&display=swap">
</head>
<body class="auth-body">

    <div class="cursor-glow"></div>
    <div class="page-noise"></div>
    <div class="background-halo halo-one"></div>
    <div class="background-halo halo-two"></div>

    <main class="auth-wrapper">
        <section class="auth-card fade-up">
            <a href="../index.html" class="auth-brand">
                <img src="../assets/icon.png" alt="Logo UniPlace">
                <span>UniPlace</span>
            </a>

            <div class="auth-heading">
                <p>Recuperación de acceso</p>
                <h1>Cambia tu contraseña</h1>
            </div>

            <p class="verify-text">
                Escribe tu correo, recibe un código y crea una nueva contraseña para volver a ingresar a UniPlace.
            </p>

            <form class="auth-form" id="forgotForm">
                <label>
                    Correo de tu cuenta
                    <input type="email" id="resetEmail" placeholder="nombre@correo.com">
                </label>

                <p class="form-message" id="forgotMessage"></p>

                <button type="submit" class="auth-submit">
                    Enviar código
                </button>
            </form>

            <form class="auth-form hidden" id="resetForm">
                <label>
                    Código recibido
                    <input type="text" id="resetCode" maxlength="6" placeholder="000000">
                </label>

                <label>
                    Nueva contraseña
                    <input type="password" id="newPassword" placeholder="Nueva contraseña">
                </label>

                <label>
                    Confirmar nueva contraseña
                    <input type="password" id="confirmNewPassword" placeholder="Repite la contraseña">
                </label>

                <p class="form-message" id="resetMessage"></p>

                <button type="submit" class="auth-submit">
                    Cambiar contraseña
                </button>

                <button type="button" class="auth-secondary-action" id="backToEmailBtn">
                    Cambiar correo
                </button>
            </form>

            <button type="button" class="auth-secondary-action recover-back-btn" id="backToLoginBtn">
                Volver al inicio de sesión
            </button>
        </section>
    </main>

    <script src="../js/forgot-password.js"></script>
</body>
</html>
